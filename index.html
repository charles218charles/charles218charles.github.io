<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>charles.email</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    :root {
      --bg1: #f7f7ff;
      --bg2: #f2f2f2;
      --bg3: #ededed;
      --fg: #111;
      --dot-size: 0.22em;
      --orbit-duration: 5s; /* 4s moving + 1s holding */
      --hold-portion: 20%;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, var(--bg1), var(--bg2) 60%, var(--bg3));
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .scene {
      position: relative;
      display: inline-block;
      padding: 1.2em 1.6em;
    }

    .mark {
      position: relative;
      z-index: 3;
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      white-space: nowrap;
    }

    /* Hidden anchor characters so spacing remains natural */
    .period-anchor,
    .idot-anchor {
      opacity: 0;
    }

    /* Build the i manually so we can hide the original dot cleanly */
    .i-letter {
      position: relative;
      display: inline-block;
      width: 0.28em;
      height: 1em;
      vertical-align: baseline;
    }

    .i-stem {
      position: absolute;
      left: 50%;
      bottom: 0.02em;
      width: 0.10em;
      height: 0.62em;
      transform: translateX(-50%);
      background: var(--fg);
      border-radius: 0.04em;
    }

    /* Invisible home markers */
    .home {
      position: absolute;
      width: 1px;
      height: 1px;
      z-index: 1;
      pointer-events: none;
    }

    /* Approximate home positions for the visible . and i dot */
    .home-period {
      left: 45.5%;
      top: 64%;
    }

    .home-idot {
      left: 76.4%;
      top: 29%;
    }

    /* Orbit guides */
    .orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      border: 1.5px solid rgba(17,17,17,0.10);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }

    .orbit-1 {
      width: min(86vw, 760px);
      height: min(30vw, 260px);
      transform: translate(-50%, -50%) rotate(-10deg);
    }

    .orbit-2 {
      width: min(72vw, 640px);
      height: min(20vw, 180px);
      transform: translate(-50%, -50%) rotate(68deg);
    }

    .nucleus-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--dot-size);
      height: var(--dot-size);
      margin-left: calc(var(--dot-size) / -2);
      margin-top: calc(var(--dot-size) / -2);
      background: var(--fg);
      border-radius: 50%;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.85),
        0 0 14px rgba(17,17,17,0.20);
      z-index: 4;
      pointer-events: none;
    }

    /* Motion:
       0% = home
       80% = one full revolution back to home
       80%-100% = hold at home for 1 second
    */
    .dot-period {
      animation: orbitPeriod var(--orbit-duration) linear infinite;
    }

    .dot-idot {
      animation: orbitIdot var(--orbit-duration) linear infinite;
    }

    @keyframes orbitPeriod {
      0% {
        left: 45.5%;
        top: 64%;
      }
      10% {
        left: 34%;
        top: 34%;
      }
      30% {
        left: 50%;
        top: 13%;
      }
      50% {
        left: 78%;
        top: 36%;
      }
      70% {
        left: 63%;
        top: 73%;
      }
      80% {
        left: 45.5%;
        top: 64%;
      }
      100% {
        left: 45.5%;
        top: 64%;
      }
    }

    @keyframes orbitIdot {
      0% {
        left: 76.4%;
        top: 29%;
      }
      10% {
        left: 61%;
        top: 72%;
      }
      30% {
        left: 34%;
        top: 60%;
      }
      50% {
        left: 28%;
        top: 26%;
      }
      70% {
        left: 58%;
        top: 15%;
      }
      80% {
        left: 76.4%;
        top: 29%;
      }
      100% {
        left: 76.4%;
        top: 29%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot-period,
      .dot-idot {
        animation: none;
      }
      .orbit {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="orbit orbit-1" aria-hidden="true"></div>
    <div class="orbit orbit-2" aria-hidden="true"></div>

    <div class="mark" aria-label="charles.email">
      charles<span class="period-anchor">.</span>ema<span class="i-letter"><span class="i-stem"></span><span class="idot-anchor">i</span></span>l
    </div>

    <div class="home home-period" aria-hidden="true"></div>
    <div class="home home-idot" aria-hidden="true"></div>

    <div class="nucleus-dot dot-period" aria-hidden="true"></div>
    <div class="nucleus-dot dot-idot" aria-hidden="true"></div>
  </div>
</body>
</html>
