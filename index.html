<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>charles.email</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 30% 20%, #f7f7ff, #f2f2f2 60%, #ededed);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: min(92vw, 1100px);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .word {
      font-size: 96px;
      font-weight: 700;
      fill: #111;
      letter-spacing: -0.03em;
    }

    .dot {
      fill: #111;
    }

    @media (max-width: 700px) {
      .word {
        font-size: 72px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbiting {
        display: none;
      }
      .home-dot {
        display: inline;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <svg viewBox="0 0 1100 260" aria-label="charles.email">
      <!-- Text with the real period and i-dot removed -->
      <text x="180" y="150" class="word">charles email</text>

      <!-- static home dots for reduced motion -->
      <circle class="dot home-dot" cx="516" cy="131" r="5.5" />
      <circle class="dot home-dot" cx="771" cy="90" r="5.5" />

      <!-- animated dots -->
      <g class="orbiting">
        <!-- period dot -->
        <circle class="dot" r="5.5">
          <animateMotion
            dur="5s"
            repeatCount="indefinite"
            keyTimes="0;0.8;1"
            keySplines="0.42 0 0.58 1;0 0 1 1"
            calcMode="spline"
            path="M 516 131
                  C 380 40, 300 95, 286 128
                  C 304 176, 438 205, 612 190
                  C 806 174, 892 108, 850 76
                  C 795 34, 638 38, 516 131" />
        </circle>

        <!-- i dot -->
        <circle class="dot" r="5.5">
          <animateMotion
            dur="5s"
            repeatCount="indefinite"
            keyTimes="0;0.8;1"
            keySplines="0.42 0 0.58 1;0 0 1 1"
            calcMode="spline"
            path="M 771 90
                  C 742 24, 660 8, 620 42
                  C 583 74, 602 150, 655 214
                  C 694 259, 731 241, 737 191
                  C 744 140, 794 117, 771 90" />
        </circle>
      </g>
    </svg>
  </div>
</body>
</html>
