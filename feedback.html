<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beazley CISO Briefing — Feedback</title>
<style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
 .container { max-width: 600px; margin: 0 auto; }
 .header { background: #1a237e; color: white; padding: 24px; border-radius: 8px 8px 0 0; }
 .header h1 { font-size: 20px; margin-bottom: 4px; }
 .header p { font-size: 13px; color: #9fa8da; }
 .card { background: white; padding: 24px; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
 .item-title { font-size: 16px; font-weight: bold; color: #1a237e; margin-bottom: 8px; }
 .item-meta { font-size: 12px; color: #888; margin-bottom: 16px; }
 .vote-row { display: flex; gap: 12px; margin-bottom: 24px; }
 .vote-btn { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; background: white; transition: all 0.2s; }
 .vote-btn.like { color: #1b5e20; }
 .vote-btn.like:hover, .vote-btn.like.selected { background: #e8f5e9; border-color: #1b5e20; }
 .vote-btn.dislike { color: #b71c1c; }
 .vote-btn.dislike:hover, .vote-btn.dislike.selected { background: #ffebee; border-color: #b71c1c; }
 .tags-section h3 { font-size: 13px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
 .tags-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
 .tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 2px solid #e8eaf6; background: #f5f5f5; color: #3949ab; transition: all 0.2s; user-select: none; }
 .tag.liked { background: #e8f5e9; border-color: #1b5e20; color: #1b5e20; }
 .tag.disliked { background: #ffebee; border-color: #b71c1c; color: #b71c1c; text-decoration: line-through; }
 .submit-btn { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
 .submit-btn:hover { background: #283593; }
 .submit-btn:disabled { background: #9fa8da; cursor: not-allowed; }
 .success { text-align: center; padding: 40px 20px; background: white; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
 .success h2 { color: #1b5e20; margin-bottom: 8px; }
 .success p { color: #555; font-size: 14px; }
 .error { background: #ffebee; color: #b71c1c; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="container">
 <div class="header">
   <h1>&#128272; Briefing Feedback</h1>
   <p>Help Claude learn what matters to you at Beazley</p>
 </div>
 <div class="card" id="form-view">
   <div class="item-title" id="item-title">Loading...</div>
   <div class="item-meta" id="item-meta"></div>

   <div class="vote-row">
     <button class="vote-btn like" id="btn-like" onclick="setVote('like')">👍 Useful</button>
     <button class="vote-btn dislike" id="btn-dislike" onclick="setVote('dislike')">👎 Not useful</button>
   </div>

   <div class="tags-section">
     <h3>Tag feedback — click to like or dislike each tag</h3>
     <div class="tags-grid" id="tags-grid"></div>
   </div>

   <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">Save Feedback</button>
   <div class="error" id="error-msg"></div>
 </div>

 <div class="success" id="success-view" style="display:none;">
   <h2>&#10003; Feedback saved</h2>
   <p>Claude will use this to improve tomorrow's briefing.</p>
 </div>
</div>

<script>
 const WORKER_URL = 'https://withered-scene-e3d6.ch-e92.workers.dev';

 let vote = null;
 let tagStates = {};
 let params = {};

 window.onload = function() {
   const urlParams = new URLSearchParams(window.location.search);
   params = {
     title: urlParams.get('title') || 'Unknown item',
     severity: urlParams.get('severity') || '',
     source: urlParams.get('source') || '',
     tags: (urlParams.get('tags') || '').split(',').filter(t => t.trim()),
     vote: urlParams.get('vote') || null,
     date: urlParams.get('date') || '',
     token: urlParams.get('token') || ''
   };

   document.getElementById('item-title').textContent = params.title;
   document.getElementById('item-meta').textContent =
     [params.severity, params.source, params.date].filter(Boolean).join(' · ');

   if (params.vote) setVote(params.vote);

   const grid = document.getElementById('tags-grid');
   params.tags.forEach(tag => {
     tagStates[tag] = 'neutral';
     const el = document.createElement('div');
     el.className = 'tag';
     el.textContent = tag;
     el.id = `tag-${tag}`;
     el.onclick = () => cycleTag(tag);
     grid.appendChild(el);
   });
 };

 function setVote(v) {
   vote = v;
   document.getElementById('btn-like').classList.toggle('selected', v === 'like');
   document.getElementById('btn-dislike').classList.toggle('selected', v === 'dislike');
 }

 function cycleTag(tag) {
   const states = ['neutral', 'liked', 'disliked'];
   const next = states[(states.indexOf(tagStates[tag]) + 1) % states.length];
   tagStates[tag] = next;
   document.getElementById(`tag-${tag}`).className = `tag ${next === 'neutral' ? '' : next}`;
 }

 async function submitFeedback() {
   const token = params.token;
   if (!token) { showError('No token found in URL — please use the link from your email.'); return; }
   if (!vote) { showError('Please click Useful or Not useful first.'); return; }

   const btn = document.getElementById('submit-btn');
   btn.disabled = true;
   btn.textContent = 'Saving...';

   const likedTags = Object.entries(tagStates).filter(([,v]) => v === 'liked').map(([k]) => k);
   const dislikedTags = Object.entries(tagStates).filter(([,v]) => v === 'disliked').map(([k]) => k);

   try {
     // Read current feedback.json via worker
     const getRes = await fetch(`${WORKER_URL}/?token=${encodeURIComponent(token)}`, {
       method: 'GET'
     });

     if (!getRes.ok) {
       const err = await getRes.json();
       showError(`Read error: ${err.error || getRes.status}`);
       btn.disabled = false;
       btn.textContent = 'Save Feedback';
       return;
     }

     const fileData = await getRes.json();
     const current = JSON.parse(atob(fileData.content.replace(/\n/g, '')));

     // Merge tag preferences
     likedTags.forEach(t => {
       if (!current.liked_tags.includes(t)) current.liked_tags.push(t);
       current.disliked_tags = current.disliked_tags.filter(d => d !== t);
     });
     dislikedTags.forEach(t => {
       if (!current.disliked_tags.includes(t)) current.disliked_tags.push(t);
       current.liked_tags = current.liked_tags.filter(l => l !== t);
     });

     // Add to history
     current.feedback_history.unshift({
       date: new Date().toISOString(),
       title: params.title,
       vote: vote,
       liked_tags: likedTags,
       disliked_tags: dislikedTags
     });
     current.feedback_history = current.feedback_history.slice(0, 50);

     // Write back via worker
     const putRes = await fetch(`${WORKER_URL}/?token=${encodeURIComponent(token)}`, {
       method: 'PUT',
       headers: { 'Content-Type': 'application/json' },
       body: JSON.stringify({
         message: `Feedback: ${vote} — ${params.title.substring(0, 50)}`,
         content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
         sha: fileData.sha
       })
     });

     if (putRes.ok) {
       document.getElementById('form-view').style.display = 'none';
       document.getElementById('success-view').style.display = 'block';
     } else {
       const err = await putRes.json();
       showError(`Save error: ${err.message || JSON.stringify(err)}`);
       btn.disabled = false;
       btn.textContent = 'Save Feedback';
     }
   } catch(e) {
     showError(`Error: ${e.message}`);
     btn.disabled = false;
     btn.textContent = 'Save Feedback';
   }
 }

 function showError(msg) {
   const el = document.getElementById('error-msg');
   el.textContent = msg;
   el.style.display = 'block';
 }
</script>
</body>
</html>
